<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cotação de Frete</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--az:#1a56db;--az2:#1e429f;--vd:#059669;--vm:#dc2626;--am:#d97706;--ci:#e5e7eb;--cic:#f3f4f6;--bd:#d1d5db;--tx:#111827;--txl:#6b7280}
    body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;color:var(--tx);min-height:100vh}
    header{background:linear-gradient(135deg,var(--az2),var(--az));color:#fff;padding:15px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    header h1{font-size:1.25rem;font-weight:700}
    header p{font-size:.78rem;opacity:.8;margin-top:2px}
    .ha{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:.87rem;font-weight:600;transition:all .2s;white-space:nowrap;text-decoration:none}
    .bp{background:var(--az);color:#fff}.bp:hover{background:var(--az2)}
    .bs{background:var(--vd);color:#fff}.bs:hover{filter:brightness(.9)}
    .bo{background:#fff;color:var(--az);border:1.5px solid var(--az)}.bo:hover{background:#eff6ff}
    .bb{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}.bb:hover{background:rgba(255,255,255,.25)}
    .bam{background:transparent;color:var(--am);border:1.5px solid var(--am);border-radius:7px;cursor:pointer;padding:5px 10px;font-size:.8rem;font-weight:600}.bam:hover{background:#fffbeb}
    .bg{background:transparent;color:var(--vm);border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-weight:700;font-size:.82rem}.bg:hover{background:#fef2f2}
    .bsm{padding:6px 12px;font-size:.8rem}
    .container{max-width:1520px;margin:0 auto;padding:20px}
    .lay{display:grid;grid-template-columns:430px 1fr;gap:20px;align-items:start}
    @media(max-width:1100px){.lay{grid-template-columns:1fr}}
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
    .card:last-child{margin-bottom:0}
    .ch{padding:12px 18px;font-size:.88rem;font-weight:700;border-bottom:1px solid var(--ci);display:flex;align-items:center;justify-content:space-between;background:var(--cic)}
    .cb{padding:15px 18px;display:flex;flex-direction:column;gap:10px}
    .fc{display:flex;flex-direction:column;gap:4px}
    .fc label{font-size:.72rem;font-weight:700;color:var(--txl);text-transform:uppercase;letter-spacing:.04em}
    .fc input,.fc select{border:1.5px solid var(--bd);border-radius:8px;padding:8px 11px;font-size:.88rem;font-family:inherit;color:var(--tx);background:#fff;transition:border-color .2s;width:100%}
    .fc input:focus,.fc select:focus{outline:none;border-color:var(--az);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
    .gr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .cg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    @media(max-width:600px){.gr2,.gr3,.cg{grid-template-columns:1fr}}
    .painel-salvas{background:#fff;border-bottom:1px solid var(--ci);padding:12px 20px}
    .salvas-lista{display:flex;flex-direction:column;gap:6px;margin-top:10px}
    .salva-item{display:flex;align-items:center;gap:8px;background:var(--cic);border-radius:8px;padding:8px 12px;flex-wrap:wrap}
    .salva-info{flex:1;min-width:0}
    .salva-pedido{font-weight:700;font-size:.85rem}
    .salva-meta{font-size:.75rem;color:var(--txl);margin-top:1px}
    .salva-acoes{display:flex;gap:6px;flex-shrink:0}
    .pstick{position:sticky;top:16px}
    .cscroll{overflow-x:auto;background:#e8edf2;border-radius:8px;padding:12px;min-height:160px}
    canvas{display:block;box-shadow:0 2px 12px rgba(0,0,0,.18)}
    .toasts{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast{background:#1f2937;color:#fff;padding:11px 17px;border-radius:9px;font-size:.86rem;box-shadow:0 4px 14px rgba(0,0,0,.2);max-width:340px;animation:su .2s ease}
    .toast.sucesso{background:#065f46}.toast.erro{background:#991b1b}
    @keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
    @media print{body>header,body>.container,body>.painel-salvas,.toasts{display:none!important}#pa{display:block!important}}
    #pa{display:none}
  </style>
</head>
<body>

<header>
  <div>
    <h1>📋 Cotação de Frete</h1>
    <p>Preencha os dados e gere o formulário para enviar às transportadoras</p>
  </div>
  <div class="ha">
    <a href="../" class="btn bb bsm">← Transportadoras</a>
  </div>
</header>

<!-- PAINEL SALVAS -->
<div class="painel-salvas" id="painel-salvas" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap">
    <div style="font-size:.9rem;font-weight:700">💾 Cotações Salvas <span id="qtd-salvas" style="font-size:.75rem;color:var(--txl);font-weight:400"></span></div>
    <button class="btn bo bsm" onclick="novaCotacao()">+ Nova</button>
  </div>
  <div class="salvas-lista" id="salvas-lista"></div>
</div>

<div class="container">
  <div class="lay">

    <!-- FORM -->
    <div>
      <div class="card">
        <div class="ch">Identificação</div>
        <div class="cb">
          <div class="gr2">
            <div class="fc"><label>Nº do Pedido</label><input type="text" id="f-pedido" placeholder="Ex: 2689" oninput="upd()"/></div>
            <div class="fc"><label>Linhas em branco</label>
              <select id="f-linhas" onchange="upd()">
                <option value="3">3 transportadoras</option>
                <option value="4">4 transportadoras</option>
                <option value="5" selected>5 transportadoras</option>
                <option value="6">6 transportadoras</option>
                <option value="7">7 transportadoras</option>
              </select>
            </div>
          </div>
          <div class="fc"><label>Tomador do Frete</label>
            <select id="f-tomador" onchange="upd()">
              <option value="REMETENTE">Remetente</option>
              <option value="DESTINATÁRIO">Destinatário</option>
              <option value="TERCEIRO">Terceiro</option>
            </select>
          </div>
        </div>
      </div>

      <div class="cg">
        <div class="card">
          <div class="ch">Remetente</div>
          <div class="cb">
            <div class="fc"><label>CNPJ</label><input type="text" id="f-cnpj-r" placeholder="00.000.000/0000-00" maxlength="18" oninput="maskCNPJ(this);upd()"/></div>
            <div class="fc"><label>CEP</label><input type="text" id="f-cep-r" placeholder="00000-000" maxlength="9" oninput="maskCEP(this);upd()"/></div>
          </div>
        </div>
        <div class="card">
          <div class="ch">Destinatário</div>
          <div class="cb">
            <div class="fc"><label>CNPJ</label><input type="text" id="f-cnpj-d" placeholder="00.000.000/0000-00" maxlength="18" oninput="maskCNPJ(this);upd()"/></div>
            <div class="fc"><label>CEP</label><input type="text" id="f-cep-d" placeholder="00000-000" maxlength="9" oninput="maskCEP(this);upd()"/></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="ch">Nota Fiscal</div>
        <div class="cb">
          <div class="gr3">
            <div class="fc"><label>Valor NF (R$)</label><input type="number" id="f-vnf" placeholder="10800.00" step="0.01" oninput="upd()"/></div>
            <div class="fc"><label>Volume</label><input type="text" id="f-vol" placeholder="80 CAIXAS" oninput="upd()"/></div>
            <div class="fc"><label>Peso</label><input type="text" id="f-pes" placeholder="1.200 KG" oninput="upd()"/></div>
          </div>
          <div class="gr2">
            <div class="fc"><label>Medidas (C × L × A cm)</label><input type="text" id="f-med" placeholder="30 X 21 X 24" oninput="upd()"/></div>
            <div class="fc"><label>Material</label><input type="text" id="f-mat" placeholder="QUÍMICO ONU: 1170 RISCO: 3" oninput="upd()"/></div>
          </div>
          <div class="fc" style="max-width:160px">
            <label>Coleta</label>
            <select id="f-col" onchange="upd()"><option value="SIM">SIM</option><option value="NÃO">NÃO</option></select>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn bo bsm" onclick="novaCotacao()">🗑 Limpar</button>
        <button class="btn bs" onclick="salvarCotacao()">💾 Salvar</button>
      </div>
    </div>

    <!-- PREVIEW -->
    <div>
      <div class="pstick">
        <div class="card">
          <div class="ch">
            <span>Pré-visualização — formulário enviado às transportadoras</span>
            <div style="display:flex;gap:8px">
              <button class="btn bs bsm" onclick="baixarPNG()">📷 Baixar PNG</button>
              <button class="btn bo bsm" onclick="gerarPDF()">🖨️ PDF</button>
            </div>
          </div>
          <div class="cb" style="padding:10px">
            <div class="cscroll"><canvas id="cv"></canvas></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="pa"></div>
<div class="toasts" id="toasts"></div>

<script>
const LS_T   = 'transportadoras_v2';
const LS_COT = 'trans_cotacoes_v1';
const LS_CFG = 'github_config_v1';
const GH_PATH = 'transportadoras/data/cotacoes.json';

let salvas = [];
let ghSHA  = null;
let ghCfg  = null;
let editandoId = null;

/* ── INIT ── */
async function init() {
  try { ghCfg = JSON.parse(localStorage.getItem(LS_CFG)); } catch { ghCfg = null; }
  try { salvas = JSON.parse(localStorage.getItem(LS_COT)) || []; } catch { salvas = []; }
  renderSalvas();
  if (ghCfg?.token) await carregarDoGH();
  upd();
}

/* ── GITHUB ── */
function ghH() { return {'Authorization':`token ${ghCfg.token}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'}; }
function ghUrl(p) { return `https://api.github.com/repos/${ghCfg.owner}/${ghCfg.repo}/contents/${p}`; }
function b64e(s) { return btoa(unescape(encodeURIComponent(s))); }
function b64d(s) { return decodeURIComponent(escape(atob(s))); }

async function carregarDoGH() {
  try {
    const r = await fetch(ghUrl(GH_PATH),{headers:ghH()});
    if (r.status===404){await fetch(ghUrl(GH_PATH),{method:'PUT',headers:ghH(),body:JSON.stringify({message:'Criar cotacoes.json',content:b64e('[]'),branch:ghCfg.branch||'main'})});return;}
    if (!r.ok) return;
    const data = await r.json();
    ghSHA = data.sha;
    salvas = JSON.parse(b64d(data.content.replace(/\n/g,'')));
    localStorage.setItem(LS_COT, JSON.stringify(salvas));
    renderSalvas();
  } catch(e){}
}
async function syncGH() {
  if (!ghCfg?.token) return;
  try {
    const r = await fetch(ghUrl(GH_PATH),{method:'PUT',headers:ghH(),body:JSON.stringify({message:`Cotações ${new Date().toLocaleString('pt-BR')}`,content:b64e(JSON.stringify(salvas,null,2)),branch:ghCfg.branch||'main',...(ghSHA?{sha:ghSHA}:{})})});
    if (r.ok) ghSHA=(await r.json()).content.sha;
  } catch(e){}
}

/* ── SALVAR / CARREGAR ── */
async function salvarCotacao() {
  const d = dados();
  if (!d.pedido){toast('Informe o Nº do Pedido.','erro');return;}
  const id = editandoId||uid();
  const obj = {id, data:hoje(), ...d};
  salvas = editandoId ? salvas.map(s=>s.id===id?obj:s) : [obj,...salvas];
  editandoId = id;
  localStorage.setItem(LS_COT,JSON.stringify(salvas));
  renderSalvas();
  toast('Salvo!','sucesso');
  await syncGH();
}
function carregarSalva(id) {
  const s = salvas.find(x=>x.id===id); if(!s) return;
  editandoId = id;
  set('f-pedido',s.pedido); set('f-tomador',s.tomador); set('f-linhas',s.linhas||'5');
  set('f-cnpj-r',s.cnpjR);  set('f-cep-r',s.cepR);
  set('f-cnpj-d',s.cnpjD);  set('f-cep-d',s.cepD);
  set('f-vnf',s.vnf); set('f-vol',s.vol); set('f-pes',s.pes);
  set('f-med',s.med); set('f-mat',s.mat); set('f-col',s.col||'SIM');
  upd();
  toast(`Pedido nº ${s.pedido} carregado.`,'sucesso');
}
async function excluirSalva(id) {
  if(!confirm('Excluir esta cotação?')) return;
  salvas = salvas.filter(s=>s.id!==id);
  if(editandoId===id) editandoId=null;
  localStorage.setItem(LS_COT,JSON.stringify(salvas));
  renderSalvas();
  await syncGH();
}
function novaCotacao() {
  editandoId=null;
  ['f-pedido','f-cnpj-r','f-cep-r','f-cnpj-d','f-cep-d','f-vnf','f-vol','f-pes','f-med','f-mat'].forEach(i=>set(i,''));
  set('f-tomador','REMETENTE'); set('f-col','SIM'); set('f-linhas','5');
  upd();
}
function renderSalvas() {
  const p=document.getElementById('painel-salvas');
  const l=document.getElementById('salvas-lista');
  const q=document.getElementById('qtd-salvas');
  if(!salvas.length){p.style.display='none';return;}
  p.style.display='block';
  q.textContent=`(${salvas.length})`;
  l.innerHTML=salvas.map(s=>`<div class="salva-item">
    <div class="salva-info">
      <div class="salva-pedido">Pedido nº ${esc(s.pedido||'—')} <span style="font-weight:400;color:var(--txl);font-size:.76rem;margin-left:6px">${s.data?formatBR(s.data):''}</span></div>
      <div class="salva-meta">Dest: ${esc(s.cnpjD||'—')} · CEP ${esc(s.cepD||'—')}</div>
    </div>
    <div class="salva-acoes">
      <button class="bam" onclick="carregarSalva('${s.id}')">📂 Abrir</button>
      <button class="bg" onclick="excluirSalva('${s.id}')">✕</button>
    </div>
  </div>`).join('');
}

/* ── DADOS ── */
function dados() {
  return {
    pedido:  g('f-pedido'),  tomador: g('f-tomador'), linhas: g('f-linhas'),
    cnpjR:   g('f-cnpj-r'), cepR:    g('f-cep-r'),
    cnpjD:   g('f-cnpj-d'), cepD:    g('f-cep-d'),
    vnf:     g('f-vnf'),    vol:     g('f-vol'),   pes: g('f-pes'),
    med:     g('f-med'),    mat:     g('f-mat'),   col: g('f-col'),
  };
}
function g(id){return document.getElementById(id)?.value||'';}
function set(id,v){const e=document.getElementById(id);if(e)e.value=v||'';}

/* ── MASKS ── */
function maskCNPJ(el){
  let v=el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})$/,'$1.$2.$3/$4-$5');
  else if(v.length>8) v=v.replace(/^(\d{2})(\d{3})(\d{3})(\d{0,4})$/,'$1.$2.$3/$4');
  else if(v.length>5) v=v.replace(/^(\d{2})(\d{3})(\d{0,3})$/,'$1.$2.$3');
  else if(v.length>2) v=v.replace(/^(\d{2})(\d{0,3})$/,'$1.$2');
  el.value=v;
}
function maskCEP(el){
  let v=el.value.replace(/\D/g,'').slice(0,8);
  if(v.length>5) v=v.replace(/^(\d{5})(\d{0,3})$/,'$1-$2');
  el.value=v;
}

/* ── DEBOUNCE ── */
let tmr=null;
function upd(){clearTimeout(tmr);tmr=setTimeout(()=>{draw();buildPA();},120);}

/* ══════════════════════════════════════════
   CANVAS — layout exato da planilha Excel
══════════════════════════════════════════ */
function draw() {
  const d   = dados();
  const cv  = document.getElementById('cv');
  const cx  = cv.getContext('2d');
  const SC  = 2;        // 2× para imagem nítida
  const nL  = parseInt(d.linhas)||5; // linhas em branco à direita

  /* ── Dimensões lógicas ── */
  const WL_LBL = 130;   // coluna de labels (esquerda)
  const WL_VAL = 295;   // coluna de valores (esquerda)
  const WR_TRA = 200;   // coluna TRANSPORTADORA (direita)
  const WR_VAL = 125;   // coluna VALOR
  const WR_COT = 120;   // coluna COTAÇÃO
  const WR_PRZ = 75;    // coluna PRAZO
  const W = WL_LBL + WL_VAL + WR_TRA + WR_VAL + WR_COT + WR_PRZ; // 945

  const H_HDR = 38;     // altura do cabeçalho
  const H_ROW = 26;     // altura das linhas

  // 14 linhas de dados no lado esquerdo
  const leftRows = [
    {s:'DADOS DO REMETENTE'},
    {l:'CNPJ', v: d.cnpjR},
    {l:'CEP',  v: d.cepR},
    {s:'DADOS DO DESTINATÁRIO'},
    {l:'CNPJ', v: d.cnpjD},
    {l:'CEP',  v: d.cepD},
    {s:'DADOS DA NOTA FISCAL'},
    {l:'VALOR',    v: d.vnf ? fmtR(d.vnf) : ''},
    {l:'VOLUME',   v: d.vol},
    {l:'PESO',     v: d.pes},
    {l:'MEDIDAS',  v: d.med},
    {l:'TOMADOR',  v: d.tomador},
    {l:'MATERIAL', v: d.mat},
    {l:'COLETA',   v: d.col},
  ];

  const nRows = Math.max(leftRows.length, nL);
  const H = H_HDR + nRows * H_ROW;

  /* ── Setup canvas ── */
  cv.width  = W * SC;
  cv.height = H * SC;
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  cx.scale(SC, SC);

  /* ── Fundo branco ── */
  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, W, H);

  /* ── Cores (iguais à planilha) ── */
  const C_GRN  = '#1E7E34';  // verde cabeçalho
  const C_SEC  = '#595959';  // cinza seção
  const C_LAB  = '#F2F2F2';  // cinza claro rótulo
  const C_WHT  = '#FFFFFF';
  const C_BRD  = '#AAAAAA';  // borda

  /* ── Helper: desenhar célula ── */
  const cell = (x, y, w, h, bg, texto, opts = {}) => {
    // fundo
    cx.fillStyle = bg;
    cx.fillRect(x, y, w, h);
    // borda
    cx.strokeStyle = C_BRD;
    cx.lineWidth   = 0.5;
    cx.strokeRect(x + 0.25, y + 0.25, w - 0.5, h - 0.5);
    if (!texto && texto !== 0) return;
    // clip + texto
    cx.save();
    cx.beginPath(); cx.rect(x + 3, y + 2, w - 6, h - 4); cx.clip();
    const sz    = opts.sz || 10;
    const bold  = opts.b  ? 'bold ' : '';
    const align = opts.a  || 'left';
    cx.font          = `${bold}${sz}px Calibri, Arial, sans-serif`;
    cx.fillStyle     = opts.c || '#111111';
    cx.textBaseline  = 'middle';
    cx.textAlign     = align;
    const tx = align === 'center' ? x + w / 2
             : align === 'right'  ? x + w - 6
             :                      x + 6;
    cx.fillText(String(texto), tx, y + h / 2);
    cx.restore();
  };

  /* ════ LINHA 0: CABEÇALHO ════ */
  // Lado esquerdo — título
  cell(0, 0, WL_LBL + WL_VAL, H_HDR,
       C_GRN, `COTAÇÃO DE FRETE DO PEDIDO Nº ${d.pedido || '____'}`,
       {b: true, sz: 12, a: 'center', c: '#FFFFFF'});

  // Lado direito — cabeçalhos das colunas
  let rx = WL_LBL + WL_VAL;
  cell(rx,              0, WR_TRA, H_HDR, C_GRN, 'TRANSPORTADORA', {b:true, sz:9.5, a:'center', c:'#FFFFFF'});
  cell(rx + WR_TRA,     0, WR_VAL, H_HDR, C_GRN, 'VALOR',          {b:true, sz:9.5, a:'center', c:'#FFFFFF'});
  cell(rx+WR_TRA+WR_VAL,0, WR_COT, H_HDR, C_GRN, 'COTAÇÃO',        {b:true, sz:9.5, a:'center', c:'#FFFFFF'});
  cell(rx+WR_TRA+WR_VAL+WR_COT,0,WR_PRZ,H_HDR, C_GRN,'PRAZO',     {b:true, sz:9.5, a:'center', c:'#FFFFFF'});

  /* ════ LINHAS 1–N ════ */
  for (let i = 0; i < nRows; i++) {
    const ry = H_HDR + i * H_ROW;
    const row = leftRows[i];

    /* Lado esquerdo */
    if (!row) {
      // linha extra (abaixo dos dados da NF) — células vazias
      cell(0,      ry, WL_LBL, H_ROW, C_LAB, '');
      cell(WL_LBL, ry, WL_VAL, H_ROW, C_WHT, '');
    } else if (row.s) {
      // cabeçalho de seção (cinza escuro, texto centralizado, span 2 cols)
      cell(0, ry, WL_LBL + WL_VAL, H_ROW, C_SEC, row.s, {b:true, sz:9.5, a:'center', c:'#FFFFFF'});
    } else {
      // linha de dado: label + valor
      cell(0,      ry, WL_LBL, H_ROW, C_LAB, row.l, {b:true, sz:9.5});
      cell(WL_LBL, ry, WL_VAL, H_ROW, C_WHT, row.v, {sz:10});
    }

    /* Lado direito — células em branco (transportadora preenche) */
    const rxi = WL_LBL + WL_VAL;
    cell(rxi,              ry, WR_TRA, H_ROW, C_WHT, '');
    cell(rxi + WR_TRA,     ry, WR_VAL, H_ROW, C_WHT, '');
    cell(rxi+WR_TRA+WR_VAL,ry, WR_COT, H_ROW, C_WHT, '');
    cell(rxi+WR_TRA+WR_VAL+WR_COT,ry,WR_PRZ,H_ROW, C_WHT, '');
  }

  /* ── Borda externa mais grossa ── */
  cx.strokeStyle = '#555555';
  cx.lineWidth   = 1.2;
  cx.strokeRect(0.6, 0.6, W - 1.2, H - 1.2);

  /* ── Linha divisória esquerda/direita ── */
  cx.strokeStyle = '#555555';
  cx.lineWidth   = 1;
  cx.beginPath();
  cx.moveTo(WL_LBL + WL_VAL, 0);
  cx.lineTo(WL_LBL + WL_VAL, H);
  cx.stroke();
}

/* ── PRINT AREA ── */
function buildPA() {
  const d = dados();
  const nL = parseInt(d.linhas)||5;

  const thG  = `style="background:#1E7E34;color:#fff;font-weight:700;padding:6px 10px;font-size:10pt;text-align:center;"`;
  const thGn = `style="background:#1E7E34;color:#fff;font-weight:700;padding:5px 8px;font-size:9pt;text-align:center;"`;
  const thS  = `style="background:#595959;color:#fff;font-weight:700;padding:5px 10px;font-size:9pt;text-align:center;" colspan="2"`;
  const tdL  = `style="background:#f2f2f2;font-weight:700;padding:4px 8px;font-size:9pt;white-space:nowrap;border:1px solid #aaa;"`;
  const tdV  = `style="padding:4px 8px;font-size:9pt;border:1px solid #aaa;"`;
  const tdE  = `style="padding:4px 8px;border:1px solid #aaa;"`;

  const leftRows = [
    {s:'DADOS DO REMETENTE'},
    {l:'CNPJ', v:d.cnpjR},{l:'CEP',v:d.cepR},
    {s:'DADOS DO DESTINATÁRIO'},
    {l:'CNPJ', v:d.cnpjD},{l:'CEP',v:d.cepD},
    {s:'DADOS DA NOTA FISCAL'},
    {l:'VALOR',v:d.vnf?fmtR(d.vnf):''},{l:'VOLUME',v:d.vol},
    {l:'PESO',v:d.pes},{l:'MEDIDAS',v:d.med},
    {l:'TOMADOR',v:d.tomador},{l:'MATERIAL',v:d.mat},{l:'COLETA',v:d.col},
  ];
  const nRows = Math.max(leftRows.length, nL);
  while(leftRows.length < nRows) leftRows.push({l:'',v:''});

  const rows = leftRows.map(r => {
    const left = r.s
      ? `<td ${thS}>${esc(r.s)}</td>`
      : `<td ${tdL}>${esc(r.l||'')}</td><td ${tdV}>${esc(r.v||'')}</td>`;
    return `<tr>${left}<td ${tdE}></td><td ${tdE}></td><td ${tdE}></td><td ${tdE}></td></tr>`;
  }).join('');

  document.getElementById('pa').innerHTML = `
    <style>@page{margin:10mm;size:A4 landscape}#pa{font-family:Calibri,Arial,sans-serif}#pa table{border-collapse:collapse;width:100%}#pa td,#pa th{border:1px solid #aaa}</style>
    <table>
      <thead>
        <tr>
          <th colspan="2" ${thG}>COTAÇÃO DE FRETE DO PEDIDO Nº ${esc(d.pedido||'____')}</th>
          <th ${thGn}>TRANSPORTADORA</th><th ${thGn}>VALOR</th><th ${thGn}>COTAÇÃO</th><th ${thGn}>PRAZO</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ── EXPORT ── */
function baixarPNG() {
  const cv = document.getElementById('cv');
  if (!cv.width){toast('Preencha os dados primeiro.','erro');return;}
  const a = document.createElement('a');
  a.download = `cotacao-${g('f-pedido')||'frete'}.png`;
  a.href = cv.toDataURL('image/png'); a.click();
  toast('Imagem baixada!','sucesso');
}
function gerarPDF(){buildPA();setTimeout(()=>window.print(),100);}

/* ── UTILS ── */
function fmtR(v){const n=parseFloat(v);if(isNaN(n))return v||'';return 'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function hoje(){return new Date().toISOString().slice(0,10);}
function formatBR(iso){if(!iso)return '';const[a,m,d]=iso.split('-');return `${d}/${m}/${a}`;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,tipo=''){
  const el=document.createElement('div');
  el.className=`toast ${tipo}`;el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';setTimeout(()=>el.remove(),400);},3500);
}

init();
</script>
